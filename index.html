<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>糊塗麵挑戰！</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #222; font-family: Arial, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* 遊戲區域佈局 */
        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 800px;
            background: #E0F6FF;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* 遊戲畫布 */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 資訊欄 (HUD) */
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 10;
            color: #333;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 1px #fff;
            display: flex;
            justify-content: space-between;
        }
        #hp-bar-container { width: 100px; height: 16px; background: #ccc; border-radius: 8px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 5px; border: 1px solid #777; }
        #hp-bar { width: 100%; height: 100%; background: #ff4d4d; transition: width 0.1s ease; }

        /* 手機觸控區域 */
        .touch-zone { position: absolute; bottom: 0; width: 50%; height: 80%; z-index: 5; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        /* 遊戲畫面 */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; padding: 30px; }
        .screen h1 { font-size: 36px; margin-bottom: 25px; color: #ffe066; }
        .screen p { font-size: 18px; margin-bottom: 40px; line-height: 1.6; }
        .screen b { color: #ffbc00; }
        .screen button { padding: 15px 40px; font-size: 22px; font-weight: bold; background: #4cd137; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 20px rgba(76, 209, 55, 0.5); }
        .screen button:active { transform: translateY(2px); }
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="hud">
            <div>分數: <span id="score-text">0</span> / 718</div>
            <div>體力: <div id="hp-bar-container"><div id="hp-bar"></div></div></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>

        <div id="start-screen" class="screen">
            <h1>挑戰 718 分！</h1>
            <p><b>【遊戲玩法】</b><br><br>
               🍜 麵：補血補分（+10 分 / +10 體力）<br>
               🥩 排骨：純補分（+30 分）<br>
               🦵 護膝：扣血扣分（-10 分 / -10 體力）<br><br>
               電腦：使用 鍵盤 ← → 方向鍵移動<br>
               手機/iPad：點擊螢幕 左半邊 或 右半邊 移動
            </p>
            <button onclick="startGame()">開始遊戲</button>
        </div>

        <div id="end-screen" class="screen hide">
            <h1 id="end-title">遊戲結束</h1>
            <p id="end-msg"></p>
            <button onclick="startGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score-text');
        const hpBar = document.getElementById('hp-bar');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const endMsg = document.getElementById('end-msg');

        // 設置 Canvas 固定解析度
        const GAME_WIDTH = 480;
        const GAME_HEIGHT = 800;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // ==========================================
        // 📢 【 填入你的 GOOGLE DRIVE 直連網址區 】
        // ==========================================
        const PLAYER_IMG_URL   = 'https://drive.google.com/file/d/1q9491QtvRAmaG6-WIgREULU1USyEM3gC/view?usp=drivesdk';
        const ITEM_NOODLE_URL  = 'https://drive.google.com/file/d/1J-FBxC85ZlGLWbMc5A5qwppwmoPTnRAr/view?usp=drivesdk';
        const ITEM_RIBS_URL    = 'https://drive.google.com/file/d/10nioQ-41zrzq9q_4uyMJ69mqqBKz2zdx/view?usp=drivesdk';
        const ITEM_KNEEPAD_URL = 'https://drive.google.com/file/d/1CRspm8xBiu-kPExSLNyeILSpcG4PyJ45/view?usp=drivesdk';
        // ==========================================

        // --- 圖片加載與初始化 ---
        let imagesLoaded = 0;
        const totalImages = 4;
        function onImageLoad() {
            imagesLoaded++;
        }

        const playerImg = new Image();
        playerImg.src = PLAYER_IMG_URL;
        playerImg.onload = onImageLoad;

        const itemNoodleImg = new Image();
        itemNoodleImg.src = ITEM_NOODLE_URL;
        itemNoodleImg.onload = onImageLoad;

        const itemRibsImg = new Image();
        itemRibsImg.src = ITEM_RIBS_URL;
        itemRibsImg.onload = onImageLoad;

        const itemKneepadImg = new Image();
        itemKneepadImg.src = ITEM_KNEEPAD_URL;
        itemKneepadImg.onload = onImageLoad;


        // 遊戲核心數據
        let gameActive = false;
        let score = 0;
        let hp = 100;
        let moveDirection = 0; // -1: 左, 1: 右, 0: 靜止
        let gameLoopId, spawnLoopId;

        // ==========================================
        // 🛠️ 【 專屬主要人物 尺寸與速度調整區 】
        // ==========================================
        const player = {
            x: GAME_WIDTH / 2,
            y: GAME_HEIGHT - 90,
            width: 80,   // 👈 如果你覺得你的人物看起來太小，可以把數值調大（例如：100）
            height: 80,  // 👈 如果你覺得你的人物看起來太小，可以把數值調大（例如：100）
            speed: 9.5   // 👈 如果覺得人物移動太慢，可以調高（例如：12）或調低
        };
        // ==========================================

        // 掉落物列表
        let items = [];

        // 物品種類屬性定義
        const itemTypes = [
            { img: itemNoodleImg, score: 10, hp: 10 },    // 麵 (+10分, +10體力)
            { img: itemRibsImg, score: 30, hp: 0 },       // 排骨 (+30分, +0體力)
            { img: itemKneepadImg, score: -10, hp: -10 }  // 護膝 (-10分, -10體力)
        ];

        // --- 鍵盤操作控制 (電腦) ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveDirection = -1;
            if (e.key === 'ArrowRight') moveDirection = 1;
        });
        window.addEventListener('keyup', (e) => {
            if ((e.key === 'ArrowLeft' && moveDirection === -1) || 
                (e.key === 'ArrowRight' && moveDirection === 1)) {
                moveDirection = 0;
            }
        });

        // --- 觸控操作控制 (手機 / iPad) ---
        const leftZone = document.getElementById('left-zone');
        const rightZone = document.getElementById('right-zone');

        leftZone.addEventListener('touchstart', (e) => { e.preventDefault(); moveDirection = -1; });
        leftZone.addEventListener('touchend', () => moveDirection = 0);
        rightZone.addEventListener('touchstart', (e) => { e.preventDefault(); moveDirection = 1; });
        rightZone.addEventListener('touchend', () => moveDirection = 0);

        // --- 遊戲運作邏輯 ---
        function startGame() {
            if (imagesLoaded < totalImages) {
                alert("圖片正在努力載入中，請確認 Google Drive 網址轉換是否正確，且皆有開啟『知道連結的任何人』權限喔！");
                return;
            }

            // 數據歸零重設
            score = 0;
            hp = 100;
            player.x = GAME_WIDTH / 2;
            moveDirection = 0;
            items = [];
            
            scoreText.innerText = score;
            hpBar.style.width = '100%';
            
            startScreen.classList.add('hide');
            endScreen.classList.add('hide');
            gameActive = true;

            // 啟動動畫與掉落計時器
            gameLoopId = requestAnimationFrame(updateGame);
            spawnLoopId = setInterval(spawnItem, 750); // 每 0.75 秒生成一個物品
        }

        function spawnItem() {
            if (!gameActive) return;

            // 隨機決定掉落物品種類機率 (麵：55% / 排骨：20%
