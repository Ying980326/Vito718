<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>糊塗麵大作戰 ⚔️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; } 
        body { background: #E0F6FF; font-family: Arial, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 480px; 
            height: 100vh; 
            max-height: 800px; 
            background: #E0F6FF; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.15);
            border: 3px solid transparent;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        /* 生日模式啟動：螢幕外框金黃霓虹閃爍與脈動特效 */
        #game-wrapper.fever-active {
            animation: goldGlow 1s infinite alternate;
        }
        @keyframes goldGlow {
            0% {
                border-color: #ffbe00;
                box-shadow: 0 0 15px #ffe066, inset 0 0 15px rgba(255, 224, 102, 0.5);
            }
            100% {
                border-color: #ff3f34;
                box-shadow: 0 0 30px #ffe066, inset 0 0 30px rgba(255, 63, 52, 0.8);
            }
        }
        
        canvas { display: block; width: 100%; height: 100%; image-rendering: -webkit-optimize-contrast; image-rendering: auto; }
        
        #hud { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            right: 15px; 
            z-index: 10; 
            color: #2c3e50; 
            font-size: 16px; 
            font-weight: bold; 
            text-shadow: 1px 1px 1px #fff; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        #fever-text { color: #ff3f34; font-weight: 900; background: rgba(255, 224, 102, 0.9); padding: 4px 10px; border-radius: 5px; box-shadow: 0 0 8px #ffe066; display: none; font-size: 13px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #hp-container-wrapper { display: flex; align-items: center; font-size: 14px; color: #2c3e50; transition: color 0.2s; }
        #hp-bar-container { position: relative; width: 95px; height: 22px; background: rgba(0, 0, 0, 0.15); border-radius: 11px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 4px; border: 1.5px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #2ecc71, #26de81); transition: width 0.1s ease; }
        
        /* 體力危急時紅光閃爍與輕微顫抖動畫 */
        #hp-container-wrapper.danger-hp {
            color: #d63031;
            animation: dangerBlink 0.6s infinite alternate, shakeHp 0.15s infinite;
        }
        #hp-container-wrapper.danger-hp #hp-bar {
            background: linear-gradient(90deg, #ff4d4d, #ff7675) !important;
        }
        #hp-container-wrapper.danger-hp #hp-bar-container {
            border-color: #ff4d4d;
        }
        @keyframes dangerBlink {
            0% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        @keyframes shakeHp {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-0.5px, 0.5px); }
            75% { transform: translate(0.5px, -0.5px); }
        }
        
        #hp-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; text-align: center; font-size: 11px; line-height: 19px; color: #fff; font-weight: 900; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); z-index: 12; }
        
        /* 🛠️ HUD 靜音按鈕美化成像素立體風 */
        #mute-btn {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            padding: 3px 6px;
            margin-left: 8px;
            box-shadow: 0 2px 0 #bbb;
            transition: transform 0.05s, box-shadow 0.05s;
            -webkit-tap-highlight-color: transparent;
        }
        #mute-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #bbb;
        }

        /* 🛠️ 日系精緻乳白毛玻璃面板 */
        .screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #005691; /* 優雅日系深藍 */
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 30; 
            text-align: center; 
            padding: 25px; 
            transition: opacity 0.3s ease;
        }
        .screen h1 { font-size: 34px; margin-bottom: 20px; color: #ff9f43; line-height: 1.3; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        .screen p { font-size: 17px; margin-bottom: 30px; line-height: 1.8; color: #2c3e50; }
        .screen b { color: #ff9f43; font-weight: bold; }
        
        .rule-list { text-align: left; background: rgba(255, 255, 255, 0.7); padding: 18px; border-radius: 12px; margin-bottom: 25px; border: 1.5px solid rgba(0, 86, 145, 0.15); width: 100%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .rule-item { font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; line-height: 1.5; color: #2c3e50; }
        .rule-item:last-child { margin-bottom: 0; }
        .rule-target { font-size: 17px; color: #ff9f43; font-weight: bold; margin-top: 10px; text-align: center; }
        
        .control-guide { font-size: 13px; color: #555; text-align: center; line-height: 1.6; margin-top: 12px; background: rgba(255, 255, 255, 0.9); padding: 8px; border-radius: 8px; border: 1px dashed rgba(0, 86, 145, 0.25); }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 260px; }
        .screen button { position: relative; z-index: 35; padding: 15px 30px; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 30px; cursor: pointer; -webkit-tap-highlight-color: transparent; width: 100%; }
        
        #start-btn { background: #4cd137; box-shadow: 0 5px 20px rgba(76, 209, 55, 0.4); }
        #start-btn:active { background: #44bd32; transform: translateY(2px); }
        
        #go-btn { background: #ff9f43; box-shadow: 0 5px 20px rgba(255, 159, 67, 0.4); }
        #go-btn:active { background: #ee5253; transform: translateY(2px); }

        #restart-btn { background: #4cd137; box-shadow: 0 5px 20px rgba(76, 209, 55, 0.4); }
        #restart-btn:active { background: #44bd32; transform: translateY(2px); }
        
        #home-btn { background: #00a8ff; box-shadow: 0 5px 20px rgba(0, 168, 255, 0.4); }
        #home-btn:active { background: #0097e6; transform: translateY(2px); }
        
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="hud">
            <div>SCORE: <span id="score-text">0</span>/718</div>
            <div id="fever-text">🎂 生日模式 5s</div>
            <!-- 🛠️ HP 區域包裹層，便於觸發紅色危急警告閃爍與抖動 -->
            <div id="hp-container-wrapper">
                ❤️ ENERGY: 
                <div id="hp-bar-container">
                    <div id="hp-bar"></div>
                    <div id="hp-text">100/100</div>
                </div>
                <!-- 🔇 靜音按鈕美化排在 HUD 最右側 -->
                <button id="mute-btn">🔊</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- 🛠️ 所有面板皆換上優雅細緻的乳白毛玻璃色調與日系深藍文字 -->
        <div id="start-screen" class="screen">
            <h1>糊塗麵大作戰 ⚔️</h1>
            <p>
                肚子吃飽飽 同時避開護膝！<br>
                累積 <b>718分</b> 完成生日任務 🎂<br>
                就有機會抽取限定小禮物 ✨
            </p>
            <div class="btn-group">
                <button id="start-btn">開始遊戲</button>
            </div>
        </div>

        <div id="rules-screen" class="screen hide">
            <h1>遊戲規則</h1>
            <div class="rule-list">
                <div class="rule-item">🍜 糊塗麵：+10分｜+5 ENERGY</div>
                <div class="rule-item">🍖 炸排骨：+17分</div>
                <div class="rule-item">🦵 護膝：-30分｜-20 ENERGY</div>
                <div class="rule-item" style="color: #ff9f43; font-weight: bold;">🎂 吃到蛋糕將開啟 5 秒生日雙倍模式！</div>
                <hr style="border: 0; border-top: 1px dashed rgba(0, 86, 145, 0.2); margin: 10px 0;">
                <div class="rule-target">⭐ 目標：累積718分即可通關！</div>
                
                <div class="control-guide">
                    💻 電腦：使用鍵盤 ← → 方向鍵左右移動<br>
                    📱 手機：在螢幕上單手左右拖曳移動人物
                </div>
            </div>
            <div class="btn-group">
                <button id="go-btn">即刻出發！</button>
            </div>
        </div>

        <div id="end-screen" class="screen hide">
            <h1 id="end-title">遊戲結束</h1>
            <p id="end-msg"></p>
            <div class="btn-group">
                <button id="restart-btn">再玩一次</button>
                <button id="home-btn">回到首頁</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score-text');
        const hpBar = document.getElementById('hp-bar');
        const hpText = document.getElementById('hp-text');
        const hpContainerWrapper = document.getElementById('hp-container-wrapper');
        const feverText = document.getElementById('fever-text'); 
        const gameWrapper = document.getElementById('game-wrapper');
        const startScreen = document.getElementById('start-screen');
        const rulesScreen = document.getElementById('rules-screen'); 
        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const endMsg = document.getElementById('end-msg');
        
        const startBtn = document.getElementById('start-btn');
        const goBtn = document.getElementById('go-btn'); 
        const restartBtn = document.getElementById('restart-btn');
        const homeBtn = document.getElementById('home-btn');
        const muteBtn = document.getElementById('mute-btn');

        const GAME_WIDTH = 480;
        const GAME_HEIGHT = 800;

        const DPR = window.devicePixelRatio || 2; 
        canvas.width = GAME_WIDTH * DPR;
        canvas.height = GAME_HEIGHT * DPR;
        ctx.scale(DPR, DPR);

        // ==========================================
        // 📢 GitHub 專屬直連網址與派對帽微調變數
        // ==========================================
        const BACKGROUND_IMG_URL = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/bg.png';
        const PLAYER_IMG_URL   = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/man.png';
        const ITEM_NOODLE_URL  = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/noodle.png';
        const ITEM_RIBS_URL    = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/rib.png';
        const ITEM_KNEEPAD_URL = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/knee.png';

        // 派對帽微調參數：已恢復為改過一次的版本（往左及往下一點，往左大於往下）
        const HAT_OFFSET_X = -18;   // 派對帽左右偏移（正數往右，負數往左）
        const HAT_OFFSET_Y = 26;    // 派對帽上下偏移（正數往下壓，負數往上飄）
        // ==========================================

        let imgStatus = { bg: false, player: false, noodle: false, ribs: false, kneepad: false };

        const bgImg = new Image();
        bgImg.crossOrigin = 'anonymous';
        bgImg.src = BACKGROUND_IMG_URL;
        bgImg.onload = () => imgStatus.bg = true;

        const player = { x: GAME_WIDTH / 2, y: GAME_HEIGHT - 120, width: 145, height: 145, speed: 13, facing: 'left' };

        const playerImg = new Image();
        playerImg.crossOrigin = 'anonymous';
        playerImg.src = PLAYER_IMG_URL;
        playerImg.onload = () => {
            imgStatus.player = true;
            const baseWidth = 145; 
            const scale = baseWidth / playerImg.width;
            player.width = baseWidth;
            player.height = playerImg.height * scale;
        };

        const itemNoodleImg = new Image();
        itemNoodleImg.crossOrigin = 'anonymous';
        itemNoodleImg.src = ITEM_NOODLE_URL;
        itemNoodleImg.onload = () => imgStatus.noodle = true;

        const itemRibsImg = new Image();
        itemRibsImg.crossOrigin = 'anonymous';
        itemRibsImg.src = ITEM_RIBS_URL;
        itemRibsImg.onload = () => imgStatus.ribs = true;

        const itemKneepadImg = new Image();
        itemKneepadImg.crossOrigin = 'anonymous';
        itemKneepadImg.src = ITEM_KNEEPAD_URL;
        itemKneepadImg.onload = () => imgStatus.kneepad = true;

        let gameActive = false;
        let score = 0;
        let hp = 100;
        let moveDirection = 0; 
        let gameLoopId, spawnLoopId, timeBurnLoopId, feverTimerId; 
        let items = [];

        // 生日模式相關變數
        let isFeverMode = false;
        let feverTimeLeft = 0;
        let hasSpawnedCake = false; 
        
        // 雲朵與操作引導變數
        let clouds = [];
        let hasInteracted = false;     // 是否已經開始移動 (開始後會淡出指引)
        let swipeGuideAlpha = 1.0;     // 引導線透明度

        let isDragging = false;
        let lastTouchX = 0;

        // ==========================================
        // 🎵 Web Audio API 復古 8-bit 進階多聲部合成器
        // ==========================================
        const audioHelper = {
            ctx: null,
            muted: false,
            bgmTimer: null,
            step: 0,
            noiseBuffer: null, // 用於合成打擊樂小鼓（Snare）

            // 1. 和弦根音進行 (Chord Roots for C - G - Am - F)
            roots: [130.81, 97.99, 110.00, 87.31], // C3, G2, A2, F2
            
            // 2. 清晨主旋律：16分音符，極具起伏與空氣感（適配 C - G - Am - F 進行）
            melody: [
                329.63, 0, 392.00, 523.25, // C Major 段：E4, 0, G4, C5
                293.66, 0, 392.00, 587.33, // G Major 段：D4, 0, G4, D5
                440.00, 0, 523.25, 659.25, // A Minor 段：A4, 0, C5, E5
                349.23, 392.00, 440.00, 523.25 // F Major 段：F4, G4, A4, C5
            ],

            // 3. 🎂 生日狂熱模式主旋律：歡樂喜慶的 8-bit 生日歌快切變奏旋律 (方波)
            feverMelody: [
                523.25, 523.25, 587.33, 523.25, 698.46, 659.25, 0, 0, // C5 C5 D5 C5 F5 E5
                523.25, 523.25, 587.33, 523.25, 698.46, 659.25, 0, 0  // C5 C5 D5 C5 G5 F5
            ],

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.createNoiseBuffer(); // 預先生成模擬鼓聲的白噪音
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            createNoiseBuffer() {
                if (!this.ctx) return;
                const bufferSize = this.ctx.sampleRate * 0.15;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                this.noiseBuffer = buffer;
            },
            
            playTone(freq, type, duration, volume = 0.1, startTime = 0) {
                if (this.muted || !this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = type;
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0.001, startTime + this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(volume, startTime + this.ctx.currentTime + 0.015);
                gain.gain.exponentialRampToValueAtTime(0.0001, startTime + this.ctx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(startTime + this.ctx.currentTime);
                osc.stop(startTime + this.ctx.currentTime + duration);
            },

            // 合成 8-bit 模擬大鼓聲 (Bass Drum sfx)
            playKick(startTime = 0) {
                if (this.muted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, startTime + this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(45, startTime + this.ctx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0.18, startTime + this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, startTime + this.ctx.currentTime + 0.12);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(startTime + this.ctx.currentTime);
                osc.stop(startTime + this.ctx.currentTime + 0.12);
            },

            // 合成 8-bit 模擬小鼓聲 (Snare Drum sfx)
            playSnare(startTime = 0) {
                if (this.muted || !this.ctx || !this.noiseBuffer) return;
                
                // 噪音源（打擊擦音）
                const noise = this.ctx.createBufferSource();
                noise.buffer = this.noiseBuffer;
                
                const noiseFilter = this.ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.07, startTime + this.ctx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, startTime + this.ctx.currentTime + 0.12);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);
                
                // 三角波基音（打擊本體）
                const osc = this.ctx.createOscillator();
                const oscGain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, startTime + this.ctx.currentTime);
                oscGain.gain.setValueAtTime(0.07, startTime + this.ctx.currentTime);
                oscGain.gain.exponentialRampToValueAtTime(0.001, startTime + this.ctx.currentTime + 0.1);
                
                osc.connect(oscGain);
                oscGain.connect(this.ctx.destination);
                
                noise.start(startTime + this.ctx.currentTime);
                osc.start(startTime + this.ctx.currentTime);
                noise.stop(startTime + this.ctx.currentTime + 0.12);
                osc.stop(startTime + this.ctx.currentTime + 0.12);
            },
            
            playEat() {
                this.playTone(523.25, 'sine', 0.1, 0.15); // 清脆高音 C5
                setTimeout(() => this.playTone(659.25, 'sine', 0.15, 0.15), 50); // E5
            },
            
            playKnee() {
                if (this.muted || !this.ctx) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.18, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.0001, this.ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            },
            
            playFeverStart() {
                const notes = [329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // 琶音 C Major 7
                notes.forEach((note, index) => {
                    setTimeout(() => {
                        this.playTone(note, 'triangle', 0.25, 0.12);
                    }, index * 60);
                });
            },
            
            playWin() {
                const notes = [523.25, 659.25, 783.99, 1046.50]; 
                notes.forEach((note, index) => {
                    setTimeout(() => {
                        this.playTone(note, 'square', 0.3, 0.08);
                    }, index * 120);
                });
            },
            
            playLose() {
                const notes = [392.00, 349.23, 311.13, 261.63]; 
                notes.forEach((note, index) => {
                    setTimeout(() => {
                        this.playTone(note, 'sawtooth', 0.35, 0.08);
                    }, index * 150);
                });
            },
            
            startBGM() {
                this.stopBGM();
                
                const runBGMStep = () => {
                    if (!gameActive) return;
                    this.init();

                    const speedFactor = isFeverMode ? 1.4 : 1.0;
                    const stepDur = (180 / speedFactor); // 基本每步的時間間隔 (ms)

                    // 1. 【啟程層次】：旋律軌 (Melody Track) - 任何分數皆播放
                    const currentMelody = isFeverMode ? this.feverMelody : this.melody;
                    const melNote = currentMelody[this.step % currentMelody.length];
                    if (melNote > 0) {
                        const waveType = isFeverMode ? 'square' : 'triangle';
                        const vol = isFeverMode ? 0.025 : 0.055;
                        this.playTone(melNote, waveType, (stepDur / 1000) * 1.5, vol);
                    }

                    // 2. 【進化層次：SCORE >= 100】：低音軌 (Bass Track)
                    if (score >= 100 || isFeverMode) {
                        const chordIndex = Math.floor((this.step % 16) / 4);
                        const rootFreq = this.roots[chordIndex];
                        if (this.step % 2 === 0) {
                            const bassVol = isFeverMode ? 0.04 : 0.055;
                            this.playTone(rootFreq, 'sine', (stepDur / 1000) * 1.8, bassVol);
                        }
                    }

                    // 3. 【極致進化層次：SCORE >= 200】：節奏鼓點軌 (Drums Track)
                    if (score >= 200 || isFeverMode) {
                        const beatIndex = this.step % 4;
                        if (beatIndex === 0) {
                            this.playKick(); 
                        } else if (beatIndex === 2) {
                            this.playSnare(); 
                        }
                    }

                    this.step++;
                    this.bgmTimer = setTimeout(runBGMStep, stepDur);
                };
                runBGMStep();
            },
            
            stopBGM() {
                if (this.bgmTimer) {
                    clearTimeout(this.bgmTimer);
                    this.bgmTimer = null;
                }
            }
        };

        // 🔊/🔇 靜音按鈕點擊事件
        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            audioHelper.init();
            audioHelper.muted = !audioHelper.muted;
            if (audioHelper.muted) {
                muteBtn.innerText = '🔇';
                audioHelper.stopBGM();
            } else {
                muteBtn.innerText = '🔊';
                if (gameActive) audioHelper.startBGM();
            }
        });

        startBtn.addEventListener('click', () => {
            audioHelper.init(); // 喚醒行動裝置音訊
            showRules();
        }); 
        goBtn.addEventListener('click', startGame);    
        restartBtn.addEventListener('click', startGame); 
        homeBtn.addEventListener('click', backToHome);

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft') { moveDirection = -1; player.facing = 'left'; hasInteracted = true; }   
            if (e.key === 'ArrowRight') { moveDirection = 1; player.facing = 'right'; hasInteracted = true; } 
        });
        window.addEventListener('keyup', (e) => {
            if ((e.key === 'ArrowLeft' && moveDirection === -1) || (e.key === 'ArrowRight' && moveDirection === 1)) moveDirection = 0;
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            isDragging = true;
            hasInteracted = true; // 觸發滑動，淡出操作引導
            const rect = canvas.getBoundingClientRect();
            lastTouchX = ((e.touches[0].clientX - rect.left) / rect.width) * GAME_WIDTH;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameActive || !isDragging) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * GAME_WIDTH;
            const deltaX = touchX - lastTouchX;
            
            if (deltaX < 0) player.facing = 'left';
            if (deltaX > 0) player.facing = 'right';
            
            player.x += deltaX;
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > GAME_WIDTH - player.width / 2) player.x = GAME_WIDTH - player.width / 2;
            
            lastTouchX = touchX;
        });

        canvas.addEventListener('touchend', () => { isDragging = false; });
        canvas.addEventListener('touchcancel', () => { isDragging = false; });

        function showRules() {
            startScreen.classList.add('hide');
            rulesScreen.classList.remove('hide');
        }

        function startGame() {
            score = 0;
            hp = 100;
            player.x = GAME_WIDTH / 2;
            player.facing = 'left'; 
            moveDirection = 0;
            isDragging = false;
            items = [];
            
            isFeverMode = false;
            hasSpawnedCake = false;
            feverTimeLeft = 0;
            feverText.style.display = 'none';
            gameWrapper.classList.remove('fever-active');

            // 🛠️ 重置操控引導機制
            hasInteracted = false;
            swipeGuideAlpha = 1.0;

            // 初始化背景中緩緩移動的半透明白雲 (限定在螢幕頂部 1/3)
            clouds = [
                { x: 30, y: 50, scale: 0.9, speed: 0.12, opacity: 0.42 },
                { x: 180, y: 110, scale: 1.2, speed: 0.08, opacity: 0.55 },
                { x: 340, y: 70, scale: 0.7, speed: 0.15, opacity: 0.38 }
            ];

            scoreText.innerText = score;
            hpBar.style.width = '100%';
            hpText.innerText = '100 / 100'; 
            hpContainerWrapper.classList.remove('danger-hp'); // 確保一開始不閃爍
            
            startScreen.classList.add('hide');
            rulesScreen.classList.add('hide');
            endScreen.classList.add('hide');
            gameActive = true;

            // 啟動 BGM 音訊旋律！
            audioHelper.startBGM();

            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (spawnLoopId) clearInterval(spawnLoopId);
            if (timeBurnLoopId) clearInterval(timeBurnLoopId); 
            if (feverTimerId) clearInterval(feverTimerId);

            gameLoopId = requestAnimationFrame(updateGame);
            spawnLoopId = setInterval(spawnItem, 450); 
            
            timeBurnLoopId = setInterval(() => {
                if (!gameActive) return;
                hp -= 2; 
                if (hp <= 0) { hp = 0; endGame(false); }
                hpBar.style.width = `${hp}%`;
                hpText.innerText = `${hp} / 100`; 

                // 🛠️ 體力低於 30% 時，HUD 的 ENERGY 發出紅色閃爍與抖動反饋
                if (hp <= 30) {
                    hpContainerWrapper.classList.add('danger-hp');
                } else {
                    hpContainerWrapper.classList.remove('danger-hp');
                }
            }, 1000);
        }

        function backToHome() {
            gameActive = false;
            audioHelper.stopBGM(); // 關閉背景音樂

            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (spawnLoopId) clearInterval(spawnLoopId);
            if (timeBurnLoopId) clearInterval(timeBurnLoopId);
            if (feverTimerId) clearInterval(feverTimerId);
            
            items = [];
            clouds = [];
            score = 0;
            hp = 100;
            isFeverMode = false;
            feverText.style.display = 'none';
            gameWrapper.classList.remove('fever-active');
            scoreText.innerText = score;
            hpBar.style.width = '100%';
            hpText.innerText = '100 / 100';
            hpContainerWrapper.classList.remove('danger-hp');

            drawGame();
            endScreen.classList.add('hide');
            rulesScreen.classList.add('hide'); 
            startScreen.classList.remove('hide');
        }

        // 生日模式啟動與霓虹邊框
        function activateFeverMode() {
            if (isFeverMode) return;
            isFeverMode = true;
            feverTimeLeft = 5;
            feverText.style.display = 'block';
            feverText.innerText = `🎂 生日模式 ${feverTimeLeft}s`;
            gameWrapper.classList.add('fever-active'); 

            audioHelper.playFeverStart(); // 播放生日狂熱和弦！
            audioHelper.startBGM();       // 切換加速版 BGM

            feverTimerId = setInterval(() => {
                feverTimeLeft--;
                if (feverTimeLeft <= 0) {
                    clearInterval(feverTimerId);
                    isFeverMode = false;
                    feverText.style.display = 'none';
                    gameWrapper.classList.remove('fever-active');
                    audioHelper.startBGM(); // 恢復常規 BGM
                } else {
                    feverText.innerText = `🎂 生日模式 ${feverTimeLeft}s`;
                }
            }, 1000);
        }

        function spawnItem() {
            if (!gameActive) return;

            if (score >= 200 && !hasSpawnedCake) {
                hasSpawnedCake = true;
                items.push({
                    typeIndex: 99, 
                    img: null,
                    isLoaded: false,
                    emoji: '🎂',
                    score: 0,
                    hp: 15, 
                    x: Math.random() * (GAME_WIDTH - 110) + 55, 
                    y: -100,
                    width: 75,  
                    height: 75, 
                    speed: 5
                });
                return;
            }

            const rand = Math.random();
            let itemTypeIndex = 0; 
            if (rand >= 0.55 && rand < 0.75) itemTypeIndex = 1; 
            else if (rand >= 0.75) itemTypeIndex = 2; 

            if (isFeverMode && itemTypeIndex === 2) {
                itemTypeIndex = Math.random() < 0.7 ? 0 : 1; 
            }

            let scoreVal = 10, hpVal = 5, emoji = '🍜', imgObj = itemNoodleImg, isLoaded = imgStatus.noodle;
            if (itemTypeIndex === 1) { scoreVal = 17; hpVal = 0; emoji = '🍖'; imgObj = itemRibsImg; isLoaded = imgStatus.ribs; }
            if (itemTypeIndex === 2) { scoreVal = -30; hpVal = -20; emoji = '🦵'; imgObj = itemKneepadImg; isLoaded = imgStatus.kneepad; }

            let itemW = 95; 
            let itemH = 95; 
            if (isLoaded && imgObj.width > 0) {
                const baseSize = 95; 
                const scale = baseSize / imgObj.width;
                itemW = baseSize;
                itemH = imgObj.height * scale;
            }

            items.push({
                typeIndex: itemTypeIndex,
                img: imgObj,
                isLoaded: isLoaded,
                emoji: emoji,
                score: scoreVal,
                hp: hpVal,
                x: Math.random() * (GAME_WIDTH - 110) + 55, 
                y: -100,
                width: itemW,
                height: itemH,
                speed: Math.random() * 3 + (isFeverMode ? 6.5 : 4.5) 
            });
        }

        function updateGame() {
            if (!gameActive) return;

            if (moveDirection === -1 && player.x > player.width / 2) {
                player.x -= player.speed;
                lastTouchX = player.x; // 確保鍵盤與滑鼠拖曳訊號流暢同步
            }
            if (moveDirection === 1 && player.x < GAME_WIDTH - player.width / 2) player.x += player.speed;

            // 🛠️ 操控引導虛線箭頭淡出邏輯
            if (isDragging || moveDirection !== 0) {
                isDragging = true; // 觸發過任何滑動，就把狀態設定為 true 隱藏引導線
            }

            // 更新雲朵緩緩飄移邏輯 (橫跨螢幕後重置並於頂部 1/3 隨機 y 軸再現)
            for (let i = 0; i < clouds.length; i++) {
                const c = clouds[i];
                c.x += c.speed;
                if (c.x > GAME_WIDTH + 80) {
                    c.x = -80;
                    c.y = Math.random() * 120 + 30; // 嚴格控制在螢幕頂部 1/3
                    c.speed = Math.random() * 0.06 + 0.06;
                    c.opacity = Math.random() * 0.2 + 0.35;
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;

                const pCollisionWidth  = player.width * 0.65;  
                const pCollisionHeight = player.height * 0.65; 

                const itemScale = (item.typeIndex === 2) ? 0.50 : 0.70;
                const iCollisionWidth  = item.width * itemScale;
                const iCollisionHeight = item.height * itemScale;

                if (
                    item.y + iCollisionHeight / 2 >= player.y - pCollisionHeight / 2 &&
                    item.y - iCollisionHeight / 2 <= player.y + pCollisionHeight / 2 &&
                    item.x + iCollisionWidth / 2  >= player.x - pCollisionWidth / 2 &&
                    item.x - iCollisionWidth / 2  <= player.x + pCollisionWidth / 2
                ) {
                    if (item.typeIndex === 99) {
                        hp += item.hp;
                        activateFeverMode(); 
                    } else {
                        let finalScoreChange = item.score;
                        if (isFeverMode && item.score > 0) {
                            finalScoreChange = item.score * 2;
                        }
                        
                        // 播放對應動作音效
                        if (finalScoreChange > 0) {
                            audioHelper.playEat();
                        } else {
                            audioHelper.playKnee();
                        }

                        score += finalScoreChange;
                        hp += item.hp;
                    }
                    
                    if (score < 0) score = 0;
                    if (hp > 100) hp = 100;
                    if (hp < 0) hp = 0;

                    scoreText.innerText = score;
                    hpBar.style.width = `${hp}%`;
                    hpText.innerText = `${hp} / 100`; 

                    items.splice(i, 1);

                    if (score >= 718) { endGame(true); return; }
                    if (hp <= 0) { endGame(false); return; }
                    continue;
                }

                if (item.y > GAME_HEIGHT) { items.splice(i, 1); }
            }

            drawGame();
            gameLoopId = requestAnimationFrame(updateGame);
        }

        // 繪製圓角輔助路徑函數
        function pathRoundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // 2D 向量繪製高畫質手繪風生日蛋糕
        function drawVectorCake(ctx, x, y, size) {
            ctx.save();
            ctx.translate(x, y);

            const s = size / 75; // 以 75px 為基礎縮放比例

            // 1. 蠟燭燈芯與閃亮光芒 (繪製在蛋糕後方)
            ctx.fillStyle = '#00a8ff'; // 浦洋藍色調蠟燭 💙
            ctx.fillRect(-3 * s, -30 * s, 6 * s, 22 * s);
            
            // 蠟燭條紋 (黃白相間)
            ctx.fillStyle = '#ffe066';
            ctx.fillRect(-3 * s, -26 * s, 6 * s, 4 * s);
            ctx.fillRect(-3 * s, -16 * s, 6 * s, 4 * s);

            // 蠟燭火焰
            ctx.fillStyle = '#ff4d4d'; 
            ctx.beginPath();
            ctx.moveTo(0, -32 * s);
            ctx.quadraticCurveTo(-5 * s, -37 * s, 0, -45 * s);
            ctx.quadraticCurveTo(5 * s, -37 * s, 0, -32 * s);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#ffbe00'; 
            ctx.beginPath();
            ctx.moveTo(0, -32 * s);
            ctx.quadraticCurveTo(-3 * s, -35 * s, 0, -40 * s);
            ctx.quadraticCurveTo(3 * s, -35 * s, 0, -32 * s);
            ctx.closePath();
            ctx.fill();

            // 2. 蛋糕主體底層 (香濃巧克力雙層結構)
            ctx.fillStyle = '#795548';
            pathRoundRect(ctx, -25 * s, -4 * s, 50 * s, 24 * s, 6 * s);
            ctx.fill();

            // 3. 蛋糕主體中層 (粉嫩草莓鮮奶油夾心)
            ctx.fillStyle = '#ff8da1';
            pathRoundRect(ctx, -25 * s, -8 * s, 50 * s, 10 * s, 4 * s);
            ctx.fill();

            // 4. 蛋糕頂層抹面 (蓬鬆潔白的香草奶油層)
            ctx.fillStyle = '#ffffff';
            pathRoundRect(ctx, -27 * s, -12 * s, 54 * s, 10 * s, 5 * s);
            ctx.fill();

            // 5. 順著蛋糕邊緣流淌下來的奶油小水滴效果
            ctx.fillStyle = '#ffffff';
            for (let ox = -20; ox <= 20; ox += 10) {
                ctx.beginPath();
                ctx.arc(ox * s, -4 * s, 4 * s, 0, Math.PI * 2);
                ctx.fill();
            }

            // 6. 裝飾在頂部的可愛大紅櫻桃
            ctx.fillStyle = '#ff4d4d';
            ctx.beginPath();
            ctx.arc(10 * s, -15 * s, 5.5 * s, 0, Math.PI * 2);
            ctx.fill();
            
            // 櫻桃的小綠梗
            ctx.strokeStyle = '#4caf50';
            ctx.lineWidth = 1 * s;
            ctx.beginPath();
            ctx.moveTo(10 * s, -19 * s);
            ctx.quadraticCurveTo(14 * s, -24 * s, 18 * s, -20 * s);
            ctx.stroke();

            ctx.restore();
        }

        // 🛠️ 繪製左右拖曳手繪風操作指引線
        function drawSwipeGuide() {
            if (isDragging || !gameActive) return; // 只要一開始滑動、或不在遊戲中，就完全不繪製

            ctx.save();
            ctx.globalAlpha = swipeGuideAlpha;
            ctx.strokeStyle = '#3c6382';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 6]); // 繪製虛線
            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = '#3c6382';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const lineY = GAME_HEIGHT - 120; // 剛好對齊玩家人物腰部

            // 左箭頭虛線
            ctx.beginPath();
            ctx.moveTo(player.x - 35, lineY);
            ctx.lineTo(player.x - 110, lineY);
            ctx.stroke();

            // 左箭頭尖端
            ctx.beginPath();
            ctx.moveTo(player.x - 110, lineY);
            ctx.lineTo(player.x - 102, lineY - 6);
            ctx.moveTo(player.x - 110, lineY);
            ctx.lineTo(player.x - 102, lineY + 6);
            ctx.stroke();

            // 右箭頭虛線
            ctx.beginPath();
            ctx.moveTo(player.x + 35, lineY);
            ctx.lineTo(player.x + 110, lineY);
            ctx.stroke();

            // 右箭頭尖端
            ctx.beginPath();
            ctx.moveTo(player.x + 110, lineY);
            ctx.lineTo(player.x + 102, lineY - 6);
            ctx.moveTo(player.x + 110, lineY);
            ctx.lineTo(player.x + 102, lineY + 6);
            ctx.stroke();

            // 手勢指引文字
            ctx.fillText('← 左右滑動控制 →', player.x, lineY - 20);

            ctx.restore();
        }

        function drawGame() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // A. 改回清晨粉藍色的美麗天空漸層背景（僅保留溫和明亮的純藍天漸層）
            const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            skyGrad.addColorStop(0, '#81d4ff');   // 柔和天藍
            skyGrad.addColorStop(0.7, '#bfe9ff'); // 淺水藍
            skyGrad.addColorStop(1, '#e0f6ff');   // 極淺亮藍
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // B. 繪製背景頂部 1/3 的慢速移動半透明白雲 (真實天空感)
            ctx.save();
            for (const c of clouds) {
                ctx.globalAlpha = c.opacity;
                ctx.fillStyle = '#ffffff';
                
                const cx = c.x;
                const cy = c.y;
                const r = 16 * c.scale;
                
                // 向量曲線繪製蓬鬆手繪風雲朵
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.arc(cx + r * 0.8, cy - r * 0.4, r * 0.8, 0, Math.PI * 2);
                ctx.arc(cx - r * 0.8, cy - r * 0.3, r * 0.7, 0, Math.PI * 2);
                ctx.arc(cx + r * 1.5, cy + r * 0.1, r * 0.6, 0, Math.PI * 2);
                ctx.arc(cx - r * 1.4, cy + r * 0.1, r * 0.6, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();

            // C. 如果有上傳背景圖，則以半透明層疊，保留其紋理
            if (imgStatus.bg) {
                ctx.save();
                ctx.globalAlpha = 0.25; 
                ctx.drawImage(bgImg, 0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.restore();
            }

            // D. 舞台所有元素已乾淨移除

            // 🛠️ 繪製新手滑動引導
            drawSwipeGuide();

            // 4. 繪製主角（含派對帽、朝向翻轉邏輯）
            if (imgStatus.player) {
                ctx.save(); 
                if (player.facing === 'right') {
                    ctx.translate(player.x, player.y);
                    ctx.scale(-1, 1); 
                    
                    ctx.drawImage(playerImg, -player.width / 2, -player.height / 2, player.width, player.height);
                    
                    if (isFeverMode) {
                        // 配合朝向渲染改過一次且往下微調版本的派對帽定位！
                        drawPartyHat(HAT_OFFSET_X, -player.height / 2 + HAT_OFFSET_Y);
                    }
                } else {
                    ctx.translate(player.x, player.y);
                    ctx.drawImage(playerImg, -player.width / 2, -player.height / 2, player.width, player.height);
                    
                    if (isFeverMode) {
                        // 配合朝向渲染改過一次且往下微調版本的派對帽定位！
                        drawPartyHat(HAT_OFFSET_X, -player.height / 2 + HAT_OFFSET_Y);
                    }
                }
                ctx.restore(); 
            } else {
                ctx.save();
                ctx.font = `120px system-ui, -apple-system, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(player.facing === 'right' ? '👉' : '🐱', player.x, player.y);
                ctx.restore();
            }

            // 5. 繪製掉落食物與地雷
            for (const item of items) {
                // 護膝主體在藍天背景下已顯眼，移除紅色亮光效果

                if (item.isLoaded) {
                    ctx.drawImage(item.img, item.x - item.width / 2, item.y - item.height / 2, item.width, item.height);
                } else {
                    if (item.typeIndex === 99) {
                        drawVectorCake(ctx, item.x, item.y, item.width);
                    } else {
                        ctx.save();
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.font = `70px system-ui, -apple-system, sans-serif`; 
                        ctx.fillText(item.emoji, item.x, item.y);
                        ctx.restore();
                    }
                }
            }
        }

        // 超萌手繪 Q 版「蓬蓬波點生日派對帽」
        function drawPartyHat(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // 1. 繪製底部軟萌的波浪褶皺花邊 (Puffy Ribbon Trim)
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#ff9f43';
            ctx.lineWidth = 1;
            const rWidth = 36;
            const rY = 3;
            const numBumps = 5;
            ctx.beginPath();
            ctx.moveTo(-rWidth/2, rY);
            for (let i = 0; i < numBumps; i++) {
                const startX = -rWidth/2 + (rWidth / numBumps) * i;
                const endX = -rWidth/2 + (rWidth / numBumps) * (i + 1);
                const midX = (startX + endX) / 2;
                ctx.quadraticCurveTo(midX, rY - 6, endX, rY);
            }
            ctx.lineTo(rWidth/2, rY + 4);
            ctx.lineTo(-rWidth/2, rY + 4);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 2. 繪製微弧形且略帶彈性膨脹感的手繪圓錐帽體
            ctx.fillStyle = '#ff4d4d'; // Q 彈草莓紅
            ctx.beginPath();
            ctx.moveTo(0, -38); // 頂點
            ctx.quadraticCurveTo(-14, -20, -17, rY); // 左邊緣略微圓潤
            ctx.lineTo(17, rY);
            ctx.quadraticCurveTo(14, -20, 0, -38); // 右邊緣略微圓潤
            ctx.closePath();
            ctx.fill();

            // 3. 繪製帽身上的可愛糖果波波點與粉藍斜斑紋
            ctx.save();
            // 剪裁路徑，只繪製在帽體內部
            ctx.beginPath();
            ctx.moveTo(0, -38);
            ctx.quadraticCurveTo(-14, -20, -17, rY);
            ctx.lineTo(17, rY);
            ctx.quadraticCurveTo(14, -20, 0, -38);
            ctx.closePath();
            ctx.clip();

            // 繪製粉藍斜紋 (💙 浦洋藍色調)
            ctx.strokeStyle = '#00a8ff';
            ctx.lineWidth = 3.5;
            ctx.beginPath();
            ctx.moveTo(-20, -25); ctx.lineTo(10, -5);
            ctx.moveTo(-10, -35); ctx.lineTo(20, -15);
            ctx.stroke();

            // 繪製亮黃色、白色波波球圖案
            ctx.fillStyle = '#ffe066';
            ctx.beginPath(); ctx.arc(-5, -14, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, -22, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(8, -10, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-6, -27, 2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            // 4. 帽頂的一大坨白色軟綿綿雲朵毛球 (Fluffy Pom-Pom)
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            const px = 0;
            const py = -39;
            const pRadius = 7.5;
            ctx.beginPath();
            // 用多個重疊小圓融合成毛茸茸的雲朵感
            ctx.arc(px, py, pRadius, 0, Math.PI * 2);
            ctx.arc(px - 3, py + 1, pRadius * 0.7, 0, Math.PI * 2);
            ctx.arc(px + 3, py + 1, pRadius * 0.7, 0, Math.PI * 2);
            ctx.arc(px, py - 3, pRadius * 0.7, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function endGame(isWin) {
            gameActive = false;
            isDragging = false;
            audioHelper.stopBGM(); // 停止播放背景音樂

            cancelAnimationFrame(gameLoopId);
            clearInterval(spawnLoopId);
            clearInterval(timeBurnLoopId); 
            if (feverTimerId) clearInterval(feverTimerId);

            if (isWin) {
                audioHelper.playWin(); // 播放勝利音樂
                endTitle.innerText = "⭐ 718達成！⭐";
                endTitle.style.color = "#ff9f43";
                endMsg.innerHTML = `肚子吃飽飽 😋！<br>不要忘記截圖此頁面參加抽獎 🎁<br><span style="font-size:14px;color:#00a8ff;display:block;margin-top:10px;">把滿滿的幸福送到浦洋手上啦 🍜💙</span>`;
            } else {
                audioHelper.playLose(); // 播放失敗音樂
                endTitle.innerText = "💀 遊戲結束";
                endTitle.style.color = "#ff4d4d";
                endMsg.innerHTML = `沒吃飽... 再試一次吧！🥺<br>最終得分：<b>${score}</b> 分。`;
            }
            endScreen.classList.remove('hide');
        }
    </script>
