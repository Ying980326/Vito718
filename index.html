<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>718分極限挑戰接接樂</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #222; font-family: Arial, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-wrapper { position: relative; width: 100%; max-width: 480px; height: 100vh; max-height: 800px; background: #E0F6FF; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        
        /* 💡 關鍵：固定外在顯示大小為 100% */
        canvas { display: block; width: 100%; height: 100%; image-rendering: -webkit-optimize-contrast; image-rendering: auto; }
        
        #hud { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10; color: #333; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 1px #fff; display: flex; justify-content: space-between; }
        #hp-bar-container { width: 100px; height: 16px; background: #ccc; border-radius: 8px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 5px; border: 1px solid #777; }
        #hp-bar { width: 100%; height: 100%; background: #ff4d4d; transition: width 0.1s ease; }
        .touch-zone { position: absolute; bottom: 0; width: 50%; height: 80%; z-index: 5; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; padding: 30px; }
        .screen h1 { font-size: 36px; margin-bottom: 25px; color: #ffe066; }
        .screen p { font-size: 18px; margin-bottom: 40px; line-height: 1.6; }
        .screen b { color: #ffbc00; }
        .screen button { padding: 15px 40px; font-size: 22px; font-weight: bold; background: #4cd137; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 20px rgba(76, 209, 55, 0.5); }
        .screen button:active { transform: translateY(2px); }
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="hud">
            <div>分數: <span id="score-text">0</span> / 718</div>
            <div>體力: <div id="hp-bar-container"><div id="hp-bar"></div></div></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>

        <div id="start-screen" class="screen">
            <h1>挑戰 718 分！</h1>
            <p><b>【遊戲玩法】</b><br><br>
               🍜 麵：補血補分（+10 分 / +10 體力）<br>
               🥩 排骨：純補分（+30 分）<br>
               🦵 護膝：扣血扣分（-10 分 / -10 體力）<br><br>
               電腦：使用 鍵盤 ← → 方向鍵移動<br>
               手機/iPad：點擊螢幕 左半邊 或 右半邊 移動
            </p>
            <button id="start-btn" onclick="startGame()">開始遊戲</button>
        </div>

        <div id="end-screen" class="screen hide">
            <h1 id="end-title">遊戲結束</h1>
            <p id="end-msg"></p>
            <button onclick="startGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score-text');
        const hpBar = document.getElementById('hp-bar');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const endMsg = document.getElementById('end-msg');

        // 邏輯上的遊戲尺寸
        const GAME_WIDTH = 480;
        const GAME_HEIGHT = 800;

        // 🛠️ 【核心高清修正】將畫布內在解析度乘以 2 倍，解決手機像素化模糊問題
        const DPR = window.devicePixelRatio || 2; 
        canvas.width = GAME_WIDTH * DPR;
        canvas.height = GAME_HEIGHT * DPR;
        // 強制縮放畫布上下文，讓後續所有的繪圖邏輯自動適應高解析度
        ctx.scale(DPR, DPR);

        // ==========================================
        // 📢 GitHub 專屬直連網址
        // ==========================================
        const PLAYER_IMG_URL   = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/man.png';
        const ITEM_NOODLE_URL  = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/noodle.png';
        const ITEM_RIBS_URL    = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/rib.png';
        const ITEM_KNEEPAD_URL = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/knee.png';
        // ==========================================

        let imgStatus = { player: false, noodle: false, ribs: false, kneepad: false };

        const player = { 
            x: GAME_WIDTH / 2, 
            y: GAME_HEIGHT - 110, 
            width: 120, 
            height: 120, 
            speed: 11 
        };

        const playerImg = new Image();
        playerImg.crossOrigin = 'anonymous';
        playerImg.src = PLAYER_IMG_URL;
