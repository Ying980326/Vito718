<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>糊塗麵大作戰 ⚔️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; } 
        body { background: #111; font-family: Arial, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 480px; 
            height: 100vh; 
            max-height: 800px; 
            background: #090615; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.85);
            border: 3px solid transparent;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        /* 生日模式啟動：螢幕外框金黃霓虹閃爍與脈動特效 */
        #game-wrapper.fever-active {
            animation: goldGlow 1s infinite alternate;
        }
        @keyframes goldGlow {
            0% {
                border-color: #ffbe00;
                box-shadow: 0 0 15px #ffe066, inset 0 0 15px rgba(255, 224, 102, 0.5);
            }
            100% {
                border-color: #ff3f34;
                box-shadow: 0 0 30px #ffe066, inset 0 0 30px rgba(255, 63, 52, 0.8);
            }
        }
        
        canvas { display: block; width: 100%; height: 100%; image-rendering: -webkit-optimize-contrast; image-rendering: auto; }
        
        #hud { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10; color: #fff; font-size: 16px; font-weight: bold; text-shadow: 1px 1px 3px #000; display: flex; justify-content: space-between; align-items: center; }
        
        #fever-text { color: #ff3f34; font-weight: 900; background: rgba(255, 224, 102, 0.9); padding: 4px 10px; border-radius: 5px; box-shadow: 0 0 8px #ffe066; display: none; font-size: 13px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #hp-container-wrapper { display: flex; align-items: center; }
        #hp-bar-container { position: relative; width: 100px; height: 22px; background: rgba(50, 50, 50, 0.6); border-radius: 11px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 5px; border: 1.5px solid #ff4d4d; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4d4d, #ff7675); transition: width 0.1s ease; }
        
        #hp-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; text-align: center; font-size: 12px; line-height: 19px; color: #fff; font-weight: 900; text-shadow: 1px 1px 2px #000; z-index: 12; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 3, 15, 0.92); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; text-align: center; padding: 25px; }
        .screen h1 { font-size: 34px; margin-bottom: 20px; color: #ffe066; line-height: 1.3; text-shadow: 0 0 10px rgba(255,224,102,0.5); }
        .screen p { font-size: 19px; margin-bottom: 35px; line-height: 1.8; color: #f5f5f5; }
        .screen b { color: #ffbc00; }
        
        .rule-list { text-align: left; background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.15); width: 100%; max-width: 350px; }
        .rule-item { font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; line-height: 1.5; }
        .rule-item:last-child { margin-bottom: 0; }
        .rule-target { font-size: 17px; color: #ffe066; font-weight: bold; margin-top: 10px; text-align: center; }
        
        .control-guide { font-size: 13px; color: #b0bec5; text-align: center; line-height: 1.6; margin-top: 10px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 260px; }
        .screen button { position: relative; z-index: 35; padding: 15px 30px; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 30px; cursor: pointer; -webkit-tap-highlight-color: transparent; width: 100%; }
        
        #start-btn { background: #4cd137; box-shadow: 0 5px 20px rgba(76, 209, 55, 0.5); }
        #start-btn:active { background: #44bd32; transform: translateY(2px); }
        
        #go-btn { background: #ff9f43; box-shadow: 0 5px 20px rgba(255, 159, 67, 0.5); }
        #go-btn:active { background: #ee5253; transform: translateY(2px); }

        #restart-btn { background: #4cd137; box-shadow: 0 5px 20px rgba(76, 209, 55, 0.5); }
        #restart-btn:active { background: #44bd32; transform: translateY(2px); }
        
        #home-btn { background: #00a8ff; box-shadow: 0 5px 20px rgba(0, 168, 255, 0.5); }
        #home-btn:active { background: #0097e6; transform: translateY(2px); }
        
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="hud">
            <div>SCORE: <span id="score-text">0</span>/718</div>
            <div id="fever-text">🎂 生日模式 5s</div>
            <div id="hp-container-wrapper">
                ENERGY: 
                <div id="hp-bar-container">
                    <div id="hp-bar"></div>
                    <div id="hp-text">100/100</div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="start-screen" class="screen">
            <h1>糊塗麵大作戰 ⚔️</h1>
            <p>
                肚子吃飽飽 同時避開護膝！<br>
                累積 <b>718分</b> 完成生日任務 🎂<br>
                就有機會抽取限定小禮物 ✨
            </p>
            <div class="btn-group">
                <button id="start-btn">開始遊戲</button>
            </div>
        </div>

        <div id="rules-screen" class="screen hide">
            <h1>遊戲規則</h1>
            <div class="rule-list">
                <div class="rule-item">🍜 糊塗麵：+10分｜+5 ENERGY</div>
                <div class="rule-item">🍖 炸排骨：+17分</div>
                <div class="rule-item">🦵 護膝：-30分｜-20 ENERGY</div>
                <div class="rule-item" style="color: #ffe066;">🎂 吃到蛋糕將開啟 5 秒生日雙倍模式！</div>
                <hr style="border: 0; border-top: 1px dashed rgba(255,255,255,0.3); margin: 10px 0;">
                <div class="rule-target">⭐ 目標：累積718分即可通關！</div>
                
                <div class="control-guide">
                    💻 電腦：使用鍵盤 ← → 方向鍵左右移動<br>
                    📱 手機：在螢幕上單手左右拖曳移動人物
                </div>
            </div>
            <div class="btn-group">
                <button id="go-btn">即刻出發！</button>
            </div>
        </div>

        <div id="end-screen" class="screen hide">
            <h1 id="end-title">遊戲結束</h1>
            <p id="end-msg"></p>
            <div class="btn-group">
                <button id="restart-btn">再玩一次</button>
                <button id="home-btn">回到首頁</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score-text');
        const hpBar = document.getElementById('hp-bar');
        const hpText = document.getElementById('hp-text');
        const feverText = document.getElementById('fever-text'); 
        const gameWrapper = document.getElementById('game-wrapper');
        const startScreen = document.getElementById('start-screen');
        const rulesScreen = document.getElementById('rules-screen'); 
        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const endMsg = document.getElementById('end-msg');
        
        const startBtn = document.getElementById('start-btn');
        const goBtn = document.getElementById('go-btn'); 
        const restartBtn = document.getElementById('restart-btn');
        const homeBtn = document.getElementById('home-btn');

        const GAME_WIDTH = 480;
        const GAME_HEIGHT = 800;

        const DPR = window.devicePixelRatio || 2; 
        canvas.width = GAME_WIDTH * DPR;
        canvas.height = GAME_HEIGHT * DPR;
        ctx.scale(DPR, DPR);

        // ==========================================
        // 📢 GitHub 專屬直連網址與派對帽微調變數
        // ==========================================
        const BACKGROUND_IMG_URL = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/bg.png';
        const PLAYER_IMG_URL   = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/man.png';
        const ITEM_NOODLE_URL  = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/noodle.png';
        const ITEM_RIBS_URL    = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/rib.png';
        const ITEM_KNEEPAD_URL = 'https://raw.githubusercontent.com/Ying980326/Vito718/main/knee.png';

        // 🛠️ 派對帽微調參數：已依要求調為往左 24 像素、往下 32 像素，戴起來更萌更端正！
        const HAT_OFFSET_X = -24;   // 派對帽左右偏移（正數往右，負數往左）
        const HAT_OFFSET_Y = 32;   // 派對帽上下偏移（正數往下壓，負數往上飄）
        // ==========================================

        let imgStatus = { bg: false, player: false, noodle: false, ribs: false, kneepad: false };

        const bgImg = new Image();
        bgImg.crossOrigin = 'anonymous';
        bgImg.src = BACKGROUND_IMG_URL;
        bgImg.onload = () => imgStatus.bg = true;

        const player = { x: GAME_WIDTH / 2, y: GAME_HEIGHT - 120, width: 145, height: 145, speed: 13, facing: 'left' };

        const playerImg = new Image();
        playerImg.crossOrigin = 'anonymous';
        playerImg.src = PLAYER_IMG_URL;
        playerImg.onload = () => {
            imgStatus.player = true;
            const baseWidth = 145; 
            const scale = baseWidth / playerImg.width;
            player.width = baseWidth;
            player.height = playerImg.height * scale;
        };

        const itemNoodleImg = new Image();
        itemNoodleImg.crossOrigin = 'anonymous';
        itemNoodleImg.src = ITEM_NOODLE_URL;
        itemNoodleImg.onload = () => imgStatus.noodle = true;

        const itemRibsImg = new Image();
        itemRibsImg.crossOrigin = 'anonymous';
        itemRibsImg.src = ITEM_RIBS_URL;
        itemRibsImg.onload = () => imgStatus.ribs = true;

        const itemKneepadImg = new Image();
        itemKneepadImg.crossOrigin = 'anonymous';
        itemKneepadImg.src = ITEM_KNEEPAD_URL;
        itemKneepadImg.onload = () => imgStatus.kneepad = true;

        let gameActive = false;
        let score = 0;
        let hp = 100;
        let moveDirection = 0; 
        let gameLoopId, spawnLoopId, timeBurnLoopId, feverTimerId; 
        let items = [];

        // 生日模式與背景特效相關變數
        let isFeverMode = false;
        let feverTimeLeft = 0;
        let hasSpawnedCake = false; 
        let neonFlicker = 1;    // 招牌電流閃爍明亮度

        let isDragging = false;
        let lastTouchX = 0;

        startBtn.addEventListener('click', showRules); 
        goBtn.addEventListener('click', startGame);    
        restartBtn.addEventListener('click', startGame); 
        homeBtn.addEventListener('click', backToHome);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { moveDirection = -1; player.facing = 'left'; }   
            if (e.key === 'ArrowRight') { moveDirection = 1; player.facing = 'right'; } 
        });
        window.addEventListener('keyup', (e) => {
            if ((e.key === 'ArrowLeft' && moveDirection === -1) || (e.key === 'ArrowRight' && moveDirection === 1)) moveDirection = 0;
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            lastTouchX = ((e.touches[0].clientX - rect.left) / rect.width) * GAME_WIDTH;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameActive || !isDragging) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * GAME_WIDTH;
            const deltaX = touchX - lastTouchX;
            
            if (deltaX < 0) player.facing = 'left';
            if (deltaX > 0) player.facing = 'right';
            
            player.x += deltaX;
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > GAME_WIDTH - player.width / 2) player.x = GAME_WIDTH - player.width / 2;
            
            lastTouchX = touchX;
        });

        canvas.addEventListener('touchend', () => { isDragging = false; });
        canvas.addEventListener('touchcancel', () => { isDragging = false; });

        function showRules() {
            startScreen.classList.add('hide');
            rulesScreen.classList.remove('hide');
        }

        function startGame() {
            score = 0;
            hp = 100;
            player.x = GAME_WIDTH / 2;
            player.facing = 'left'; 
            moveDirection = 0;
            isDragging = false;
            items = [];
            
            isFeverMode = false;
            hasSpawnedCake = false;
            feverTimeLeft = 0;
            feverText.style.display = 'none';
            gameWrapper.classList.remove('fever-active');

            scoreText.innerText = score;
            hpBar.style.width = '100%';
            hpText.innerText = '100 / 100'; 
            
            startScreen.classList.add('hide');
            rulesScreen.classList.add('hide');
            endScreen.classList.add('hide');
            gameActive = true;

            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (spawnLoopId) clearInterval(spawnLoopId);
            if (timeBurnLoopId) clearInterval(timeBurnLoopId); 
            if (feverTimerId) clearInterval(feverTimerId);

            gameLoopId = requestAnimationFrame(updateGame);
            spawnLoopId = setInterval(spawnItem, 450); 
            
            timeBurnLoopId = setInterval(() => {
                if (!gameActive) return;
                hp -= 2; 
                if (hp <= 0) { hp = 0; endGame(false); }
                hpBar.style.width = `${hp}%`;
                hpText.innerText = `${hp} / 100`; 
            }, 1000);
        }

        function backToHome() {
            gameActive = false;
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (spawnLoopId) clearInterval(spawnLoopId);
            if (timeBurnLoopId) clearInterval(timeBurnLoopId);
            if (feverTimerId) clearInterval(feverTimerId);
            
            items = [];
            score = 0;
            hp = 100;
            isFeverMode = false;
            feverText.style.display = 'none';
            gameWrapper.classList.remove('fever-active');
            scoreText.innerText = score;
            hpBar.style.width = '100%';
            hpText.innerText = '100 / 100';

            drawGame();
            endScreen.classList.add('hide');
            rulesScreen.classList.add('hide'); 
            startScreen.classList.remove('hide');
        }

        // 生日模式啟動與霓虹邊框
        function activateFeverMode() {
            if (isFeverMode) return;
            isFeverMode = true;
            feverTimeLeft = 5;
            feverText.style.display = 'block';
            feverText.innerText = `🎂 生日模式 ${feverTimeLeft}s`;
            gameWrapper.classList.add('fever-active'); 

            feverTimerId = setInterval(() => {
                feverTimeLeft--;
                if (feverTimeLeft <= 0) {
                    clearInterval(feverTimerId);
                    isFeverMode = false;
                    feverText.style.display = 'none';
                    gameWrapper.classList.remove('fever-active');
                } else {
                    feverText.innerText = `🎂 生日模式 ${feverTimeLeft}s`;
                }
            }, 1000);
        }

        function spawnItem() {
            if (!gameActive) return;

            if (score >= 200 && !hasSpawnedCake) {
                hasSpawnedCake = true;
                items.push({
                    typeIndex: 99, 
                    img: null,
                    isLoaded: false,
                    emoji: '🎂',
                    score: 0,
                    hp: 15, 
                    x: Math.random() * (GAME_WIDTH - 110) + 55, 
                    y: -100,
                    width: 75,  
                    height: 75, 
                    speed: 5
                });
                return;
            }

            const rand = Math.random();
            let itemTypeIndex = 0; 
            if (rand >= 0.55 && rand < 0.75) itemTypeIndex = 1; 
            else if (rand >= 0.75) itemTypeIndex = 2; 

            if (isFeverMode && itemTypeIndex === 2) {
                itemTypeIndex = Math.random() < 0.7 ? 0 : 1; 
            }

            let scoreVal = 10, hpVal = 5, emoji = '🍜', imgObj = itemNoodleImg, isLoaded = imgStatus.noodle;
            if (itemTypeIndex === 1) { scoreVal = 17; hpVal = 0; emoji = '🍖'; imgObj = itemRibsImg; isLoaded = imgStatus.ribs; }
            if (itemTypeIndex === 2) { scoreVal = -30; hpVal = -20; emoji = '🦵'; imgObj = itemKneepadImg; isLoaded = imgStatus.kneepad; }

            let itemW = 95; 
            let itemH = 95; 
            if (isLoaded && imgObj.width > 0) {
                const baseSize = 95; 
                const scale = baseSize / imgObj.width;
                itemW = baseSize;
                itemH = imgObj.height * scale;
            }

            items.push({
                typeIndex: itemTypeIndex,
                img: imgObj,
                isLoaded: isLoaded,
                emoji: emoji,
                score: scoreVal,
                hp: hpVal,
                x: Math.random() * (GAME_WIDTH - 110) + 55, 
                y: -100,
                width: itemW,
                height: itemH,
                speed: Math.random() * 3 + (isFeverMode ? 6.5 : 4.5) 
            });
        }

        function updateGame() {
            if (!gameActive) return;

            if (moveDirection === -1 && player.x > player.width / 2) player.x -= player.speed;
            if (moveDirection === 1 && player.x < GAME_WIDTH - player.width / 2) player.x += player.speed;

            if (Math.random() < 0.05) {
                neonFlicker = Math.random() < 0.2 ? 0.4 : 1.0; 
            } else {
                neonFlicker = Math.min(1.0, neonFlicker + 0.1); 
            }

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;

                const pCollisionWidth  = player.width * 0.65;  
                const pCollisionHeight = player.height * 0.65; 

                const itemScale = (item.typeIndex === 2) ? 0.50 : 0.70;
                const iCollisionWidth  = item.width * itemScale;
                const iCollisionHeight = item.height * itemScale;

                if (
                    item.y + iCollisionHeight / 2 >= player.y - pCollisionHeight / 2 &&
                    item.y - iCollisionHeight / 2 <= player.y + pCollisionHeight / 2 &&
                    item.x + iCollisionWidth / 2  >= player.x - pCollisionWidth / 2 &&
                    item.x - iCollisionWidth / 2  <= player.x + pCollisionWidth / 2
                ) {
                    if (item.typeIndex === 99) {
                        hp += item.hp;
                        activateFeverMode(); 
                    } else {
                        let finalScoreChange = item.score;
                        if (isFeverMode && item.score > 0) {
                            finalScoreChange = item.score * 2;
                        }
                        score += finalScoreChange;
                        hp += item.hp;
                    }
                    
                    if (score < 0) score = 0;
                    if (hp > 100) hp = 100;
                    if (hp < 0) hp = 0;

                    scoreText.innerText = score;
                    hpBar.style.width = `${hp}%`;
                    hpText.innerText = `${hp} / 100`; 

                    items.splice(i, 1);

                    if (score >= 718) { endGame(true); return; }
                    if (hp <= 0) { endGame(false); return; }
                    continue;
                }

                if (item.y > GAME_HEIGHT) { items.splice(i, 1); }
            }

            drawGame();
            gameLoopId = requestAnimationFrame(updateGame);
        }

        function pathRoundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function drawNeonSign() {
            ctx.save();
            
            const signX = GAME_WIDTH / 2;
            const signY = 135;
            const signW = 240;
            const signH = 88; // 稍微拉高容納副標題

            // 1. 繪製精緻雙吊掛金屬鏈
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(signX - 90, signY - 44);
            ctx.lineTo(signX - 45, signY - 80);
            ctx.lineTo(signX + 45, signY - 80);
            ctx.lineTo(signX + 90, signY - 44);
            ctx.stroke();

            // 2. 日系半透明深色黑膠背板
            ctx.fillStyle = 'rgba(10, 8, 18, 0.88)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1.5;
            ctx.save();
            ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 8;
            pathRoundRect(ctx, signX - signW/2, signY - signH/2, signW, signH, 12);
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            // 3. 繪製日式屏風網格背景 (Kusiko)
            ctx.strokeStyle = 'rgba(255, 42, 42, 0.12)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            // 縱線
            for (let ox = -signW/2 + 20; ox < signW/2; ox += 25) {
                ctx.moveTo(signX + ox, signY - signH/2 + 6);
                ctx.lineTo(signX + ox, signY + signH/2 - 6);
            }
            // 橫線
            for (let oy = -signH/2 + 15; oy < signH/2; oy += 20) {
                ctx.moveTo(signX - signW/2 + 6, signY + oy);
                ctx.lineTo(signX + signW/2 - 6, signY + oy);
            }
            ctx.stroke();

            // 4. 極具張力的日式大紅色雙重霓虹外框 (日系霓虹街頭核心)
            ctx.save();
            ctx.strokeStyle = '#ff2a2a'; // 鮮亮正紅色
            ctx.lineWidth = 4;
            ctx.shadowColor = '#ff2a2a';
            ctx.shadowBlur = isFeverMode ? 25 : 14;
            ctx.globalAlpha = neonFlicker * 0.85;
            // 外層紅框
            pathRoundRect(ctx, signX - signW/2 + 6, signY - signH/2 + 6, signW - 12, signH - 12, 8);
            ctx.stroke();

            // 內層紅白光芯
            ctx.strokeStyle = '#fff2f2';
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 4;
            pathRoundRect(ctx, signX - signW/2 + 6, signY - signH/2 + 6, signW - 12, signH - 12, 8);
            ctx.stroke();
            ctx.restore();

            // 5. 頂部迷你金色日系漢字燈管：【生誕祭】
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 15px "Microsoft JhengHei", sans-serif';
            ctx.letterSpacing = '6px';
            
            // 金色霓虹發光層
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 3.5;
            ctx.shadowColor = '#ffaa00';
            ctx.shadowBlur = isFeverMode ? 14 : 8;
            ctx.globalAlpha = neonFlicker * 0.9;
            ctx.strokeText('生誕祭', signX + 3, signY - 24); // 補償字體間距

            // 白色極致燈芯層
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 2;
            ctx.globalAlpha = neonFlicker;
            ctx.fillText('生誕祭', signX + 3, signY - 24);
            ctx.restore();

            // 6. 主標題 "VITO 0718"：極美浦洋藍霓虹燈
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 28px "Arial Black", Impact, sans-serif'; 
            
            // 浦洋藍發光層
            ctx.strokeStyle = '#00f0ff';
            ctx.lineWidth = 6;
            ctx.shadowColor = '#00d2ff';
            ctx.shadowBlur = isFeverMode ? 22 : 12;
            ctx.globalAlpha = neonFlicker * 0.9;
            ctx.strokeText('VITO 0718', signX, signY + 14);

            // 白色燈芯層
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 3;
            ctx.globalAlpha = neonFlicker;
            ctx.fillText('VITO 0718', signX, signY + 14);
            ctx.restore();

            ctx.restore();
        }

        function drawStageBackground() {
            // A. 背景漸層 (演唱會暗紫色基調)
            const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            skyGrad.addColorStop(0, '#04020c');
            skyGrad.addColorStop(0.4, '#0e081e');
            skyGrad.addColorStop(1, '#15092a');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // B. 如果有上傳背景圖，則以半透明層疊，保留其紋理並融入舞台中
            if (imgStatus.bg) {
                ctx.save();
                ctx.globalAlpha = 0.35; // 35% 混色
                ctx.drawImage(bgImg, 0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.restore();
            }

            // C. 繪製 3D 空間舞台地板 (從 y=350 開始向下無限延伸)
            const horizonY = 350;
            const floorGrad = ctx.createLinearGradient(0, horizonY, 0, GAME_HEIGHT);
            floorGrad.addColorStop(0, '#0a0515');
            floorGrad.addColorStop(1, '#050209');
            
            ctx.save();
            ctx.fillStyle = floorGrad;
            ctx.beginPath();
            ctx.moveTo(0, horizonY);
            ctx.lineTo(GAME_WIDTH, horizonY);
            ctx.lineTo(GAME_WIDTH, GAME_HEIGHT);
            ctx.lineTo(0, GAME_HEIGHT);
            ctx.closePath();
            ctx.fill();

            // 地板亮漆 3D 縱向反光格線
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = -100; i <= GAME_WIDTH + 100; i += 50) {
                ctx.beginPath();
                ctx.moveTo(GAME_WIDTH / 2 + (i - GAME_WIDTH / 2) * 0.1, horizonY);
                ctx.lineTo(i, GAME_HEIGHT);
                ctx.stroke();
            }
            // 橫向透視格線
            for (let h = horizonY; h < GAME_HEIGHT; h += (GAME_HEIGHT - h) * 0.18 + 8) {
                ctx.beginPath();
                ctx.moveTo(0, h);
                ctx.lineTo(GAME_WIDTH, h);
                ctx.stroke();
            }
            ctx.restore();

            // D. 🛠️ 繪製更寬敞氣派的巨型「Runway 璀璨星光大道」
            ctx.save();
            // 拓寬跑道區域
            const roadLeftBottom = -80;
            const roadRightBottom = GAME_WIDTH + 80;
            const roadLeftTop = GAME_WIDTH / 2 - 120; // 🛠️ 大幅拓寬頂部 Runway (原為 -45)
            const roadRightTop = GAME_WIDTH / 2 + 120; // 🛠️ 大幅拓寬頂部 Runway (原為 +45)

            const rGrad = ctx.createLinearGradient(0, horizonY, 0, GAME_HEIGHT);
            rGrad.addColorStop(0, 'rgba(18, 12, 38, 0.95)');
            rGrad.addColorStop(1, 'rgba(10, 6, 22, 0.98)');
            ctx.fillStyle = rGrad;
            ctx.beginPath();
            ctx.moveTo(roadLeftTop, horizonY);
            ctx.lineTo(roadRightTop, horizonY);
            ctx.lineTo(roadRightBottom, GAME_HEIGHT);
            ctx.lineTo(roadLeftBottom, GAME_HEIGHT);
            ctx.closePath();
            ctx.fill();

            // 🛠️ 移除原有的藍/粉色邊緣以及虛線

            // 🛠️ 新增：沿著 Runway 兩側邊緣繪製白色地板投射地燈與光束
            const numGroundLights = 3;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.18)';
            for (let i = 0; i < numGroundLights; i++) {
                const ratio = i / (numGroundLights - 1);
                // 透視插值計算兩側地燈座標
                const lx = roadLeftTop + (roadLeftBottom - roadLeftTop) * ratio;
                const rx = roadRightTop + (roadRightBottom - roadRightTop) * ratio;
                const ly = horizonY + (GAME_HEIGHT - horizonY) * ratio;

                // 繪製地燈光源本體 (白色小圓)
                ctx.save();
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(lx, ly, 4, 0, Math.PI * 2);
                ctx.arc(rx, ly, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // 投射向上的白色扇形光錐
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                const lightLength = 120 + ratio * 80;
                const beamGrad = ctx.createLinearGradient(0, ly, 0, ly - lightLength);
                beamGrad.addColorStop(0, 'rgba(255, 255, 255, 0.12)');
                beamGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = beamGrad;

                // 左地燈光束
                ctx.beginPath();
                ctx.moveTo(lx, ly);
                ctx.lineTo(lx - 25, ly - lightLength);
                ctx.lineTo(lx + 25, ly - lightLength);
                ctx.closePath();
                ctx.fill();

                // 右地燈光束
                ctx.beginPath();
                ctx.moveTo(rx, ly);
                ctx.lineTo(rx - 25, ly - lightLength);
                ctx.lineTo(rx + 25, ly - lightLength);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            ctx.restore();

            // E. 兩側演唱會金屬桁架結構 (Truss)
            ctx.save();
            ctx.strokeStyle = 'rgba(60, 60, 85, 0.35)';
            ctx.lineWidth = 2.5;
            // 左側架子
            ctx.beginPath();
            ctx.moveTo(0, 100);
            ctx.lineTo(40, horizonY);
            ctx.lineTo(0, horizonY + 80);
            ctx.moveTo(0, horizonY);
            ctx.lineTo(40, horizonY);
            ctx.stroke();
            // 右側架子
            ctx.beginPath();
            ctx.moveTo(GAME_WIDTH, 100);
            ctx.lineTo(GAME_WIDTH - 40, horizonY);
            ctx.lineTo(GAME_WIDTH, horizonY + 80);
            ctx.moveTo(GAME_WIDTH, horizonY);
            ctx.lineTo(GAME_WIDTH - 40, horizonY);
            ctx.stroke();
            ctx.restore();
        }

        function drawSpotlight(sourceX, sourceY, targetAngle, spreadAngle, length, colorStart, colorEnd) {
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            const grad = ctx.createRadialGradient(sourceX, sourceY, 0, sourceX, sourceY, length);
            grad.addColorStop(0, colorStart);
            grad.addColorStop(0.3, colorStart);
            grad.addColorStop(1, colorEnd);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(sourceX, sourceY);
            ctx.arc(sourceX, sourceY, length, targetAngle - spreadAngle/2, targetAngle + spreadAngle/2);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawConcertLights() {
            const t = Date.now() * 0.0012; // 時間變量，用於物理波動擺動

            // 🛠️ 將所有角落舞台射燈全部統一調整為「璀璨白光」，更有日系極簡與現代感！
            const whiteStart = 'rgba(255, 255, 255, 0.22)';
            const whiteEnd = 'rgba(255, 255, 255, 0)';

            // 1. 左上角掃射射燈 (白光 🤍)
            const angle1 = Math.PI * 0.18 + Math.sin(t) * 0.12; 
            drawSpotlight(0, 80, angle1, 0.28, 480, whiteStart, whiteEnd);

            // 2. 右上角掃射射燈 (白光 🤍)
            const angle2 = Math.PI * 0.82 + Math.sin(t * 1.1 + 1.5) * 0.12;
            drawSpotlight(GAME_WIDTH, 80, angle2, 0.28, 480, whiteStart, whiteEnd);

            // 3. 左下角副舞台投射燈 (白光 🤍)
            const angle3 = -Math.PI * 0.3 + Math.cos(t * 0.8) * 0.15;
            drawSpotlight(0, 500, angle3, 0.22, 400, 'rgba(255, 255, 255, 0.12)', whiteEnd);

            // 4. 右下角副舞台投射燈 (白光 🤍)
            const angle4 = -Math.PI * 0.7 + Math.cos(t * 0.9 + 2.0) * 0.15;
            drawSpotlight(GAME_WIDTH, 500, angle4, 0.22, 400, 'rgba(255, 255, 255, 0.12)', whiteEnd);
        }

        function drawGame() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // 1. 繪製動態 3D Runway 舞台背景
            drawStageBackground();

            // 2. 繪製動態擺動的 4 束演唱會舞台聚光燈 (Spotlights)
            drawConcertLights();

            // 3. 繪製日式雙色霓虹燈招牌 VITO 0718
            drawNeonSign();

            // 4. 繪製主角（含派對帽、朝向翻轉邏輯）
            if (imgStatus.player) {
                ctx.save(); 
                if (player.facing === 'right') {
                    ctx.translate(player.x, player.y);
                    ctx.scale(-1, 1); 
                    
                    ctx.drawImage(playerImg, -player.width / 2, -player.height / 2, player.width, player.height);
                    
                    if (isFeverMode) {
                        drawPartyHat(HAT_OFFSET_X, -player.height / 2 + HAT_OFFSET_Y);
                    }
                } else {
                    ctx.translate(player.x, player.y);
                    ctx.drawImage(playerImg, -player.width / 2, -player.height / 2, player.width, player.height);
                    
                    if (isFeverMode) {
                        drawPartyHat(HAT_OFFSET_X, -player.height / 2 + HAT_OFFSET_Y);
                    }
                }
                ctx.restore(); 
            } else {
                ctx.save();
                ctx.font = `120px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(player.facing === 'right' ? '👉' : '🐱', player.x, player.y);
                ctx.restore();
            }

            // 5. 繪製掉落食物與地雷
            for (const item of items) {
                // 🛠️ 核心功能修正：如果掉落物是「🦵 護膝（地雷）」，在它正後方渲染一圈紅色的霓虹發光預警圈！
                if (item.typeIndex === 2) {
                    ctx.save();
                    ctx.globalCompositeOperation = 'screen';
                    
                    // 呼吸動態半徑
                    const glowRadius = 38 + Math.sin(Date.now() * 0.015) * 6;
                    const rGrad = ctx.createRadialGradient(item.x, item.y, 10, item.x, item.y, glowRadius);
                    rGrad.addColorStop(0, 'rgba(255, 42, 42, 0.7)');
                    rGrad.addColorStop(0.4, 'rgba(255, 42, 42, 0.35)');
                    rGrad.addColorStop(1, 'rgba(255, 42, 42, 0)');
                    
                    ctx.fillStyle = rGrad;
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, glowRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                if (item.isLoaded) {
                    ctx.drawImage(item.img, item.x - item.width / 2, item.y - item.height / 2, item.width, item.height);
                } else {
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    // 🎂 精準等比例尺寸：將蛋糕 Emoji 限制在視覺上與其他等大的 55px
                    if (item.typeIndex === 99) {
                        ctx.font = `55px Arial`; 
                    } else {
                        ctx.font = `70px Arial`; 
                    }
                    ctx.fillText(item.emoji, item.x, item.y);
                    ctx.restore();
                }
            }
        }

        // 🛠️ 重新設計成超萌手繪 Q 版「蓬蓬波點生日派對帽」
        function drawPartyHat(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // 1. 繪製底部軟萌的波浪褶皺花邊 (Puffy Ribbon Trim)
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#ff9f43';
            ctx.lineWidth = 1;
            const rWidth = 36;
            const rY = 3;
            const numBumps = 5;
            ctx.beginPath();
            ctx.moveTo(-rWidth/2, rY);
            for (let i = 0; i < numBumps; i++) {
                const startX = -rWidth/2 + (rWidth / numBumps) * i;
                const endX = -rWidth/2 + (rWidth / numBumps) * (i + 1);
                const midX = (startX + endX) / 2;
                ctx.quadraticCurveTo(midX, rY - 6, endX, rY);
            }
            ctx.lineTo(rWidth/2, rY + 4);
            ctx.lineTo(-rWidth/2, rY + 4);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 2. 繪製微弧形且略帶彈性膨脹感的手繪圓錐帽體
            ctx.fillStyle = '#ff4d4d'; // Q 彈草莓紅
            ctx.beginPath();
            ctx.moveTo(0, -38); // 頂點
            ctx.quadraticCurveTo(-14, -20, -17, rY); // 左邊緣略微圓潤
            ctx.lineTo(17, rY);
            ctx.quadraticCurveTo(14, -20, 0, -38); // 右邊緣略微圓潤
            ctx.closePath();
            ctx.fill();

            // 3. 繪製帽身上的可愛糖果波波點與粉藍斜斑紋 (Cuteness Overload)
            ctx.save();
            // 剪裁路徑，只繪製在帽體內部
            ctx.beginPath();
            ctx.moveTo(0, -38);
            ctx.quadraticCurveTo(-14, -20, -17, rY);
            ctx.lineTo(17, rY);
            ctx.quadraticCurveTo(14, -20, 0, -38);
            ctx.closePath();
            ctx.clip();

            // 繪製粉藍斜紋 (💙 浦洋藍色調)
            ctx.strokeStyle = '#00a8ff';
            ctx.lineWidth = 3.5;
            ctx.beginPath();
            ctx.moveTo(-20, -25); ctx.lineTo(10, -5);
            ctx.moveTo(-10, -35); ctx.lineTo(20, -15);
            ctx.stroke();

            // 繪製亮黃色、白色波波球圖案
            ctx.fillStyle = '#ffe066';
            ctx.beginPath(); ctx.arc(-5, -14, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, -22, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(8, -10, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-6, -27, 2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            // 4. 帽頂的一大坨白色軟綿綿雲朵毛球 (Fluffy Pom-Pom)
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            const px = 0;
            const py = -39;
            const pRadius = 7.5;
            ctx.beginPath();
            // 用多個重疊小圓融合成毛茸茸的雲朵感
            ctx.arc(px, py, pRadius, 0, Math.PI * 2);
            ctx.arc(px - 3, py + 1, pRadius * 0.7, 0, Math.PI * 2);
            ctx.arc(px + 3, py + 1, pRadius * 0.7, 0, Math.PI * 2);
            ctx.arc(px, py - 3, pRadius * 0.7, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function endGame(isWin) {
            gameActive = false;
            isDragging = false;
            cancelAnimationFrame(gameLoopId);
            clearInterval(spawnLoopId);
            clearInterval(timeBurnLoopId); 
            if (feverTimerId) clearInterval(feverTimerId);

            if (isWin) {
                endTitle.innerText = "⭐ 718達成！⭐";
                endTitle.style.color = "#ffe066";
                endMsg.innerHTML = `肚子吃飽飽 😋！<br>不要忘記截圖此頁面參加抽獎 🎁<br><span style="font-size:14px;color:#00a8ff;display:block;margin-top:10px;">把滿滿的幸福送到浦洋手上啦 🍜💙</span>`;
            } else {
                endTitle.innerText = "💀 遊戲結束";
                endTitle.style.color = "#ff4d4d";
                endMsg.innerHTML = `沒吃飽... 再試一次吧！🥺<br>最終得分：<b>${score}</b> 分。`;
            }
            endScreen.classList.remove('hide');
        }
    </script>
